name: qooxdoo-kit CI

on:
  pull_request:
    branches:
      - "*"
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "qooxdoo-kit/**"
      - ".github/workflows/qooxdoo-kit.yml"
  push:
    branches:
      - master
    paths:
      - "qooxdoo-kit/**"
      - ".github/workflows/qooxdoo-kit.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qooxdoo-kit:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          pushd qooxdoo-kit
          make build
          popd

