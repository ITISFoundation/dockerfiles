name: qooxdoo-kit CI

on:
  pull_request:
    branches:
      - "*"
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "qooxdoo-kit/**"
      - ".github/workflows/qooxdoo-kit.yml"
  push:
    branches:
      - master
    paths:
      - "qooxdoo-kit/**"
      - ".github/workflows/qooxdoo-kit.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: github.event_name == 'pull_request'
        run: |
          pushd qooxdoo-kit
          make build DOCKER_TARGET_PLATFORMS=${{ matrix.platform }}
          popd

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push image by digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          pushd qooxdoo-kit
          make push-digest \
            DOCKER_TARGET_PLATFORMS=${{ matrix.platform }} \
            DIGESTS_DIR=${{ runner.temp }}/digests
          popd

      - name: Upload digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Create multi-arch manifest list
        run: |
          pushd qooxdoo-kit
          make create-manifest DIGESTS_DIR=${{ runner.temp }}/digests
          popd
